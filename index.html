<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>SignalScope</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f8fafc;--bg2:#f1f5f9;--cd:#ffffff;--cdh:#f1f5f9;--bd:#e2e8f0;--bd2:#cbd5e1;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--gn:#059669;--gg:rgba(5,150,105,.08);--rd:#dc2626;--rg:rgba(220,38,38,.08);--am:#d97706;--bl:#2563eb;--pu:#7c3aed;--cy:#0891b2;--or:#ea580c;--tl:#0d9488;--pk:#db2777}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 16px}
.hi{max-width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:8px}.lic{width:28px;height:28px;background:linear-gradient(135deg,var(--gn),var(--cy));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}.lt{font-size:15px;font-weight:700}
.hr{display:flex;align-items:center;gap:6px}
.bdg{display:flex;align-items:center;gap:4px;padding:4px 9px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.dot{width:6px;height:6px;border-radius:50%}.dot.on{background:var(--gn);animation:p1 2s infinite}.dot.off{background:var(--rd)}.dot.w{background:var(--am);animation:p2 2s infinite}
@keyframes p1{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 5px rgba(5,150,105,0)}}
@keyframes p2{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.4)}50%{box-shadow:0 0 0 5px rgba(217,119,6,0)}}
.btn{padding:6px 12px;border:1px solid var(--bd);border-radius:7px;background:var(--cd);color:var(--t1);font-size:12px;font-weight:600;cursor:pointer;transition:.1s}.btn:active{transform:scale(.97)}
.btn-g{background:linear-gradient(135deg,var(--gn),#047857);border:none;color:#fff}.btn-g:disabled{opacity:.5}
.btn-sm{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-r{background:var(--rg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.btn-pu{background:rgba(124,58,237,.08);color:var(--pu);border:1px solid rgba(124,58,237,.2)}
.mn{max-width:100%;margin:0 auto;padding:14px}

/* ── Market Switcher Bar ── */
.mkt-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--cd);border-bottom:1px solid var(--bd);overflow-x:auto}
.mkt-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;background:var(--bg2);color:var(--t2);display:flex;align-items:center;gap:8px;white-space:nowrap;transition:all .15s}
.mkt-btn:hover{background:var(--cdh);border-color:var(--bd2)}
.mkt-btn.active{background:linear-gradient(135deg,rgba(5,150,105,.08),rgba(8,145,178,.08));border-color:var(--gn);color:var(--gn)}
.mkt-btn .mkt-flag{font-size:18px}
.mkt-btn .mkt-label{display:flex;flex-direction:column;line-height:1.2}
.mkt-btn .mkt-name{font-size:13px;font-weight:700}
.mkt-btn .mkt-sub{font-size:9px;font-weight:500;opacity:.7}

/* ── Index Chart ── */
.idx-chart-wrap{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.idx-chart-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.idx-chart-title{font-size:18px;font-weight:800;color:var(--t1)}
.idx-chart-price{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.idx-chart-chg{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.idx-chart-controls{display:flex;gap:4px}
.res-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);transition:.1s}
.res-btn.active{background:var(--gn);color:#fff;border-color:var(--gn)}
.res-btn:hover:not(.active){background:var(--cdh)}
.idx-chart-canvas{width:100%;height:180px;position:relative}
.idx-chart-stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.idx-stat{display:flex;flex-direction:column}.idx-stat-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}.idx-stat-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}

.sts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.st{background:var(--cd);border:1px solid var(--bd);border-radius:9px;padding:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:3px}
.stv{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.sts2{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.idx-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.8}
.tabs{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:9px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 12px;border-radius:6px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border:none;background:transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tab.a{background:var(--cd);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tc{padding:1px 5px;border-radius:7px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700}
.tcg{background:var(--gg);color:var(--gn)}.tcr{background:var(--rg);color:var(--rd)}.tcb{background:rgba(37,99,235,.08);color:var(--bl)}.tcp{background:rgba(124,58,237,.08);color:var(--pu)}
.srch{position:relative;margin-bottom:12px}.srch input{width:100%;padding:9px 12px 9px 34px;background:var(--cd);border:1px solid var(--bd);border-radius:9px;color:var(--t1);font-size:13px;outline:none}.srch input:focus{border-color:var(--bl)}.srch input::placeholder{color:var(--t3)}.srch::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px}
.tc2{background:var(--cd);border:1px solid var(--bd);border-radius:11px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}thead{position:sticky;top:0;z-index:5}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--bg2);border-bottom:1px solid var(--bd);white-space:nowrap;cursor:pointer}
td{padding:10px;border-bottom:1px solid var(--bd);white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:13px}
tr{transition:background .1s}tr:hover{background:var(--cdh)}
.sn{font-family:'DM Sans',sans-serif}.sns{font-weight:700;font-size:14px;color:var(--t1)}.snn{font-size:11px;color:var(--t3)}
.pb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(124,58,237,.08);color:var(--pu);margin-left:4px}
.itag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;margin-left:3px}
.itag-n50{background:rgba(124,58,237,.1);color:#7c3aed}
.itag-n100{background:rgba(8,145,178,.1);color:var(--cy)}
.itag-bse{background:rgba(234,88,12,.1);color:var(--or)}
.itag-nasdaq{background:rgba(37,99,235,.1);color:var(--bl)}
.score{padding:4px 10px;border-radius:6px;font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;cursor:pointer;display:inline-block;min-width:40px;text-align:center}
.score-buy{background:var(--gg);color:var(--gn);border:1px solid rgba(5,150,105,.2)}.score-buy.strong{background:rgba(5,150,105,.12);box-shadow:0 0 8px rgba(5,150,105,.1)}
.score-sell{background:var(--rg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.rr{font-size:12px;font-weight:600}.rr-good{color:var(--gn)}.rr-ok{color:var(--am)}.rr-bad{color:var(--rd)}
.sig{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px}
.sig-b{background:var(--gg);color:var(--gn);border:1px solid rgba(5,150,105,.15)}.sig-mb{background:rgba(8,145,178,.08);color:var(--cy);border:1px solid rgba(8,145,178,.15)}.sig-s{background:var(--rg);color:var(--rd);border:1px solid rgba(220,38,38,.15)}.sig-h{background:rgba(148,163,184,.06);color:var(--t3);border:1px solid rgba(148,163,184,.15)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .15s}
@media(min-width:768px){.mo{align-items:center;padding:24px}}@keyframes fi{from{opacity:0}to{opacity:1}}
.moc{background:var(--cd);border:1px solid var(--bd);border-radius:14px 14px 0 0;width:100%;max-height:88dvh;overflow-y:auto;animation:su .2s ease;box-shadow:0 -4px 24px rgba(0,0,0,.1)}
@media(min-width:768px){.moc{max-width:680px;border-radius:14px;max-height:85vh;box-shadow:0 8px 32px rgba(0,0,0,.12)}}@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.moh{padding:16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--cd);z-index:1}
.mox{width:26px;height:26px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob{padding:16px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:480px){.ig{grid-template-columns:1fr}}
.ic{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:10px}
.ich{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ict{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t2)}
.ics{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}.ics.p{background:var(--gg);color:var(--gn)}.ics.f{background:var(--rg);color:var(--rd)}
.icv{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}.icd{font-size:10px;color:var(--t3);margin-top:3px}
.sbar{width:100%;height:8px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden;margin-top:4px}.sbar-f{height:100%;border-radius:4px;transition:width .3s}
.sr-row{display:flex;gap:10px;margin-top:12px;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px}.sr-item{flex:1;text-align:center}.sr-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}.sr-val{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:2px}
.wl-bar{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.wl-chip{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(124,58,237,.25);background:rgba(124,58,237,.05);color:var(--pu);display:flex;align-items:center;gap:5px}
.wl-chip.a{background:var(--pu);color:#fff;border-color:var(--pu)}
.wl-chip .x{font-size:13px;opacity:.6;cursor:pointer;margin-left:2px}.wl-chip .x:hover{opacity:1}
.wl-add-btn{padding:5px 10px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px dashed var(--bd2);background:transparent;color:var(--t3)}
.wl-input{padding:5px 10px;border-radius:16px;font-size:12px;border:1px solid var(--pu);background:var(--cd);color:var(--t1);outline:none;width:120px}
.scan-bar{background:var(--cd);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.scan-prog{flex:1;height:6px;background:rgba(0,0,0,.05);border-radius:3px;overflow:hidden}.scan-fill{height:100%;background:var(--gn);border-radius:3px;transition:width .5s}
.scan-txt{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.setup{text-align:center;padding:50px 20px;max-width:460px;margin:0 auto}.setup h2{font-size:18px;margin:12px 0 8px}.setup p{color:var(--t2);font-size:14px;line-height:1.6;margin-bottom:14px}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:var(--t3)}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--gn);border-radius:50%;animation:spn .7s linear infinite;margin-bottom:10px}@keyframes spn{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 16px;color:var(--t3)}
.docs-content{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);line-height:1.7;background:#ffffff;}
.docs-content h1{font-size:20px;font-weight:800;margin:24px 0 12px;color:var(--t1);border-bottom:2px solid var(--bd);padding-bottom:8px}
.docs-content h2{font-size:16px;font-weight:700;margin:20px 0 10px;color:var(--bl)}
.docs-content h3{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--t1)}
.docs-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;font-family:'JetBrains Mono',monospace}
.docs-content th{padding:8px 10px;border:1px solid var(--bd);font-weight:700;background:var(--bg2);font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--t3);text-align:left}
.docs-content td{padding:6px 10px;border:1px solid var(--bd);font-size:12px}
.docs-content code{background:var(--bg2);padding:1px 5px;border-radius:3px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--pu)}
.docs-content strong{color:var(--t1)}
.docs-content hr{border:none;border-top:1px solid var(--bd);margin:20px 0}
@media(max-width:600px){.sts{grid-template-columns:repeat(2,1fr)}.stv{font-size:17px}.mn{padding:10px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;
const API=window.location.origin;
const fmt=(n,d=2)=>n!=null?Number(n).toFixed(d):'—';
const fmtVol=(n)=>{if(!n||n===0)return'—';if(n>=10000000)return(n/10000000).toFixed(1)+'Cr';if(n>=100000)return(n/100000).toFixed(1)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return String(Math.round(n))};
const ago=(iso)=>{if(!iso)return'Never';const d=(Date.now()-new Date(iso).getTime())/1e3;if(d<60)return Math.floor(d)+'s';if(d<3600)return Math.floor(d/60)+'m';return Math.floor(d/3600)+'h'};
const ITAG_CLS={"NIFTY 50":"itag-n50","NIFTY 100":"itag-n100","BSE 100":"itag-bse","NASDAQ 100":"itag-nasdaq"};
const PH_COL={"BUY FLIP":"var(--gn)","EARLY BUY":"#34d399","SELL FLIP":"var(--rd)","EARLY SELL":"#f87171","BULLISH":"var(--gn)","BEARISH":"var(--rd)","NEUTRAL":"var(--t3)"};

const MARKETS={
  nifty500:{id:"nifty500",name:"NIFTY 500",flag:"🇮🇳",sub:"Indian Markets · NSE",currency:"₹",
    indices:[
      {symbol:"^NSEI",name:"NIFTY 50"},
      {symbol:"^NSEBANK",name:"BANK NIFTY"},
      {symbol:"^BSESN",name:"SENSEX"},
    ]},
  nasdaq100:{id:"nasdaq100",name:"NASDAQ 100",flag:"🇺🇸",sub:"US Markets · NASDAQ",currency:"$",
    indices:[
      {symbol:"^IXIC",name:"NASDAQ Composite"},
      {symbol:"^NDX",name:"NASDAQ 100"},
      {symbol:"^GSPC",name:"S&P 500"},
      {symbol:"^DJI",name:"Dow Jones"},
    ]},
};

function loadWL(){try{return JSON.parse(localStorage.getItem('ss_watchlists'))||{}}catch(e){return{}}}
function saveWL(w){localStorage.setItem('ss_watchlists',JSON.stringify(w))}

function ITags({indices}){
  if(!indices||!indices.length)return null;
  return React.createElement(React.Fragment,null,indices.map(function(i){return React.createElement('span',{key:i,className:'itag '+(ITAG_CLS[i]||'')},i)}));
}

function RR({ratio}){
  if(!ratio||ratio<=0)return <span className="rr rr-bad">—</span>;
  var cl=ratio>=2?'rr-good':ratio>=1?'rr-ok':'rr-bad';
  return <span className={'rr '+cl}>{ratio.toFixed(1)}:1</span>;
}

function MACDSlope({slope,phase,curve,zeroY,macdVal}){
  if(slope==null)return <span style={{color:'var(--t3)',fontSize:'10px'}}>—</span>;
  var col=PH_COL[phase]||'var(--t3)';
  var zy=typeof zeroY==='number'?zeroY:0.5;
  var pathD='';
  if(curve&&curve.length>2){
    var w=48,h=18;
    var pts=curve.map(function(v,i){return (i/(curve.length-1))*w+','+(h-v*h)});
    pathD='M'+pts.join(' L');
  }
  var macdStr=typeof macdVal==='number'?(macdVal>=0?'+':'')+macdVal.toFixed(1):'';
  return <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
    {pathD && <svg width="48" height="18" viewBox="0 0 48 18" style={{flexShrink:0}}>
      <line x1="0" y1={18-zy*18} x2="48" y2={18-zy*18} stroke="#dc2626" strokeWidth="1.5" strokeDasharray="2,2" opacity="0.6"/>
      <path d={pathD} fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={48} cy={18-(curve[curve.length-1]||0)*18} r="2" fill={col}/>
    </svg>}
    <div style={{display:'flex',flexDirection:'column'}}>
      {phase && <span style={{fontSize:'8px',fontWeight:700,color:col,letterSpacing:'.3px',lineHeight:'1.2'}}>{phase}</span>}
      <span style={{fontSize:'10px',fontFamily:"'JetBrains Mono'",color:col}}>{slope>0?'+':''}{slope.toFixed(2)}</span>
      {macdStr && <span style={{fontSize:'9px',fontFamily:"'JetBrains Mono'",color:'#334155',fontWeight:600,lineHeight:'1.1'}}>{macdStr}</span>}
    </div>
  </div>;
}

function PriceAccel({vel,accel,upDays}){
  var v=typeof vel==='number'?vel:null;
  var a=typeof accel==='number'?accel:null;
  if(v===null&&a===null)return <span style={{color:'var(--t3)',fontSize:'10px'}}>—</span>;
  var vv=v||0, aa=a||0, ud=upDays||0;
  var vCol=vv>0?'var(--gn)':vv<0?'var(--rd)':'var(--t3)';
  var aCol=aa>0?'var(--gn)':aa<0?'var(--rd)':'var(--t3)';
  return <div style={{display:'flex',flexDirection:'column'}}>
    <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
      <span style={{fontSize:'12px',fontFamily:"'JetBrains Mono'",color:vCol,fontWeight:700}}>{vv>0?'+':''}{vv.toFixed(2)}%</span>
      {ud>=3 && <span style={{fontSize:'9px',background:'var(--gg)',color:'var(--gn)',padding:'0 3px',borderRadius:'2px',fontWeight:700}}>{'↑'+ud+'d'}</span>}
    </div>
    <span style={{fontSize:'9px',fontFamily:"'JetBrains Mono'",color:aCol}}>{aa>0?'▲':aa<0?'▼':'–'} {Math.abs(aa).toFixed(3)}</span>
  </div>;
}

/* ═══ Index Chart Component ═══ */
function IndexChart({market,overrideSymbol}){
  var mktConf=MARKETS[market];
  if(!mktConf)return null;
  var [selIdx,setSelIdx]=useState(overrideSymbol||mktConf.indices[0].symbol);
  var [resolution,setResolution]=useState('1d');
  var [period,setPeriod]=useState('1y');
  var [chartData,setChartData]=useState(null);
  var [loading,setLoading]=useState(false);
  var canvasRef=useRef(null);

  useEffect(function(){
    setSelIdx(overrideSymbol||mktConf.indices[0].symbol);
  },[market,overrideSymbol]);

  useEffect(function(){
    setLoading(true);
    fetch(API+'/api/index_chart?index='+encodeURIComponent(selIdx)+'&resolution='+resolution+'&period='+period)
      .then(function(r){
        if(!r.ok){console.error('Chart API error:',r.status,r.statusText)}
        return r.json()
      })
      .then(function(d){
        if(!d.error){setChartData(d)}
        else{console.error('Chart data error:',d.error);setChartData(null)}
      })
      .catch(function(e){console.error('Chart fetch failed:',e);setChartData(null)})
      .finally(function(){setLoading(false)});
  },[selIdx,resolution,period]);

  // Draw chart on canvas
  useEffect(function(){
    if(!chartData||!canvasRef.current)return;
    var canvas=canvasRef.current;
    var ctx=canvas.getContext('2d');
    var dpr=window.devicePixelRatio||1;
    var rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*dpr;
    canvas.height=rect.height*dpr;
    ctx.scale(dpr,dpr);
    var W=rect.width,H=rect.height;
    var closes=chartData.closes;
    if(!closes||closes.length<2)return;
    var mn=Math.min.apply(null,closes);
    var mx=Math.max.apply(null,closes);
    var rng=mx-mn||1;
    var pad={t:8,b:24,l:4,r:4};
    var cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;

    ctx.clearRect(0,0,W,H);

    // Gradient fill
    var isUp=closes[closes.length-1]>=closes[0];
    var grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    if(isUp){grad.addColorStop(0,'rgba(5,150,105,.18)');grad.addColorStop(1,'rgba(5,150,105,.01)');}
    else{grad.addColorStop(0,'rgba(220,38,38,.18)');grad.addColorStop(1,'rgba(220,38,38,.01)');}

    // Build path
    ctx.beginPath();
    for(var i=0;i<closes.length;i++){
      var x=pad.l+(i/(closes.length-1))*cw;
      var y=pad.t+ch-(closes[i]-mn)/rng*ch;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    // Fill
    var pathEnd={x:pad.l+cw,y:pad.t+ch-(closes[closes.length-1]-mn)/rng*ch};
    ctx.lineTo(pad.l+cw,H-pad.b);
    ctx.lineTo(pad.l,H-pad.b);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    for(var i=0;i<closes.length;i++){
      var x=pad.l+(i/(closes.length-1))*cw;
      var y=pad.t+ch-(closes[i]-mn)/rng*ch;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=isUp?'#059669':'#dc2626';
    ctx.lineWidth=2;
    ctx.lineJoin='round';
    ctx.stroke();

    // Latest dot
    var lastX=pad.l+cw;
    var lastY=pad.t+ch-(closes[closes.length-1]-mn)/rng*ch;
    ctx.beginPath();
    ctx.arc(lastX,lastY,4,0,Math.PI*2);
    ctx.fillStyle=isUp?'#059669':'#dc2626';
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;
    ctx.stroke();

    // Date labels — always show full "Mon DD" format for clarity
    ctx.fillStyle='#64748b';
    ctx.font='8.5px JetBrains Mono';
    ctx.textAlign='center';
    var dates=chartData.dates;
    var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    // Fewer labels to avoid overlap: max 5 labels
    var numLabels=Math.min(5, dates.length);
    var step=Math.max(1,Math.floor((dates.length-1)/(numLabels-1)));
    for(var li=0;li<numLabels;li++){
      var i=Math.min(li*step, dates.length-1);
      var x=pad.l+(i/(dates.length-1))*cw;
      var d=dates[i]; // format: YYYY-MM-DD
      var parts=d.split('-');
      var yr=parts[0], mo=parseInt(parts[1],10), dy=parseInt(parts[2],10);
      var lbl='';
      if(resolution==='1mo'){
        // Monthly: 'Mar 2025'
        lbl=MONTHS[mo-1]+' '+yr;
      } else if(period==='1y'||period==='2y'||period==='5y'){
        // Long period daily/weekly: 'Mar 25' (month + short year)
        lbl=MONTHS[mo-1]+" '"+yr.substring(2);
      } else {
        // Short period daily/weekly: 'Mar 6' (month + day)
        lbl=MONTHS[mo-1]+' '+dy;
      }
      ctx.fillText(lbl,x,H-4);
    }

    // Price range labels
    ctx.textAlign='right';
    ctx.fillStyle='#94a3b8';
    ctx.fillText(mx.toLocaleString(),W-4,pad.t+10);
    ctx.fillText(mn.toLocaleString(),W-4,H-pad.b-4);
  },[chartData]);

  if(!mktConf)return null;
  var cur=chartData?chartData.currency:mktConf.currency;
  var isUp=chartData&&chartData.day_change_pct>=0;

  return <div className="idx-chart-wrap">
    <div className="idx-chart-hdr">
      <div>
        {/* Index selector tabs — hide when overrideSymbol is set */}
        {!overrideSymbol && <div style={{display:'flex',gap:'4px',marginBottom:'8px'}}>
          {mktConf.indices.map(function(idx){
            return <button key={idx.symbol} onClick={function(){setSelIdx(idx.symbol)}}
              style={{padding:'4px 10px',borderRadius:'5px',fontSize:'11px',fontWeight:700,cursor:'pointer',
                border:selIdx===idx.symbol?'1px solid var(--bl)':'1px solid var(--bd)',
                background:selIdx===idx.symbol?'rgba(37,99,235,.08)':'var(--bg2)',
                color:selIdx===idx.symbol?'var(--bl)':'var(--t2)'
              }}>{idx.name}</button>
          })}
        </div>}
        <div className="idx-chart-title">{chartData?chartData.name:(overrideSymbol||mktConf.indices[0].name)}</div>
        {chartData && <div style={{display:'flex',alignItems:'baseline',gap:'10px',marginTop:'4px'}}>
          <span className="idx-chart-price">{cur}{chartData.latest.toLocaleString()}</span>
          <span className="idx-chart-chg" style={{color:isUp?'var(--gn)':'var(--rd)'}}>
            {(isUp?'+':'')+chartData.day_change.toLocaleString()+' ('+(isUp?'+':'')+chartData.day_change_pct.toFixed(2)+'%)'}
          </span>
        </div>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px',alignItems:'flex-end'}}>
        <div className="idx-chart-controls">
          {["1d","1wk","1mo"].map(function(r){
            return <button key={r} className={'res-btn '+(resolution===r?'active':'')}
              onClick={function(){setResolution(r)}}>{r==='1d'?'Day':r==='1wk'?'Week':'Month'}</button>
          })}
        </div>
        <div className="idx-chart-controls">
          {(resolution==='1mo'?["1y","2y","5y"]:resolution==='1wk'?["3mo","6mo","1y","2y"]:["1mo","3mo","6mo","1y"]).map(function(p){
            return <button key={p} className={'res-btn '+(period===p?'active':'')}
              onClick={function(){setPeriod(p)}}>{p}</button>
          })}
        </div>
      </div>
    </div>
    {loading?<div style={{height:'180px',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="sp"/></div>
    :chartData?<div>
      <canvas ref={canvasRef} className="idx-chart-canvas" style={{width:'100%',height:'180px'}}/>
      <div className="idx-chart-stats">
        <div className="idx-stat"><span className="idx-stat-label">Period Change</span><span className="idx-stat-val" style={{color:chartData.period_change_pct>=0?'var(--gn)':'var(--rd)'}}>{(chartData.period_change_pct>=0?'+':'')+chartData.period_change_pct.toFixed(2)+'%'}</span></div>
        <div className="idx-stat"><span className="idx-stat-label">Period High</span><span className="idx-stat-val">{cur}{chartData.high.toLocaleString()}</span></div>
        <div className="idx-stat"><span className="idx-stat-label">Period Low</span><span className="idx-stat-val">{cur}{chartData.low.toLocaleString()}</span></div>
        <div className="idx-stat"><span className="idx-stat-label">Data Points</span><span className="idx-stat-val">{chartData.data_points}</span></div>
      </div>
    </div>
    :<div style={{height:'180px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',fontSize:'12px'}}>Could not load chart data</div>}
  </div>;
}

        return <div className="ic" key={k}><div className="ich"><span className="ict">{k.toUpperCase()}</span><span className={'ics '+(b.pass?'p':'f')}>{b.pts+'/'+b.max}</span></div><div className="icv">{b.val!=null?b.val:'—'}</div><div className="sbar"><div className="sbar-f" style={{width:pct+'%',background:b.pass?'var(--gn)':'var(--rd)'}}/></div><div className="icd">{b.desc}</div></div>
      })}</div>
      <h3 style={{fontSize:'11px',fontWeight:700,color:'var(--rd)',marginBottom:'8px'}}>SELL INDICATORS</h3>
      <div className="ig">{["sma_break","macd_inflection","rsi","bollinger","adx","obv"].map(function(k){var b=(s.sell_breakdown||{})[k];if(!b)return null;return <div className="ic" key={k}><div className="ich"><span className="ict">{k.toUpperCase()}</span><span style={{fontSize:'9px',fontWeight:700,color:b.pass?'var(--rd)':'var(--t3)'}}>{b.pts+'/'+b.max}</span></div>{b.pass&&<div style={{height:'4px',borderRadius:'2px',background:'var(--rg)',overflow:'hidden',marginBottom:'4px'}}><div style={{width:Math.round(b.pts/b.max*100)+'%',height:'100%',background:'var(--rd)',borderRadius:'2px'}}/></div>}<div className="icd" style={{fontSize:'10px',color:b.pass?'var(--t2)':'var(--t3)'}}>{b.desc}</div></div>})}</div>

}

var SECTOR_COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];

function SectorMiniChart({closes,isUp,width,height}){
  if(!closes||closes.length<2)return null;
  var mn=Math.min.apply(null,closes),mx=Math.max.apply(null,closes),rng=mx-mn||1;
  var pts=closes.map(function(v,i){return(i/(closes.length-1))*width+','+(height-(v-mn)/rng*height)});
  var pathD='M'+pts.join(' L');
  var col=isUp?'#059669':'#dc2626';
  var gradId='sg'+Math.random().toString(36).substr(2,5);
  return <svg width={width} height={height} viewBox={'0 0 '+width+' '+height}>
    <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.2"/><stop offset="100%" stopColor={col} stopOpacity="0.01"/></linearGradient></defs>
    <path d={pathD+' L'+width+','+height+' L0,'+height+' Z'} fill={'url(#'+gradId+')'}/>
    <path d={pathD} fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function SectorDashboard(){
  var [sectors,setSectors]=useState(null);
  var [loading,setLoading]=useState(false);
  var [resolution,setResolution]=useState('1d');
  var [period,setPeriod]=useState('3mo');
  var [selSector,setSelSector]=useState(null);

  useEffect(function(){
    setLoading(true);setSectors(null);
    fetch(API+'/api/sectors?resolution='+resolution+'&period='+period)
      .then(function(r){return r.json()})
      .then(function(d){if(Array.isArray(d))setSectors(d)})
      .catch(function(){})
      .finally(function(){setLoading(false)});
  },[resolution,period]);

  if(loading)return <div className="ld"><div className="sp"/>Loading sector data...</div>;
  if(!sectors)return <div className="empty">Could not load sector data.</div>;

  // Sort by day change % (best to worst)
  var sorted=sectors.filter(function(s){return !s.error}).slice().sort(function(a,b){return(b.day_change_pct||0)-(a.day_change_pct||0)});
  var bestPct=sorted.length>0?Math.max.apply(null,sorted.map(function(s){return Math.abs(s.day_change_pct||0)})):1;

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <div style={{fontSize:'16px',fontWeight:800,color:'var(--t1)'}}>📊 Sector Performance</div>
      <div style={{display:'flex',gap:'4px'}}>
        {["1d","1wk","1mo"].map(function(r){return <button key={r} className={'res-btn '+(resolution===r?'active':'')} onClick={function(){setResolution(r)}}>{r==='1d'?'Day':r==='1wk'?'Week':'Month'}</button>})}
        <span style={{width:'1px',background:'var(--bd)',margin:'0 4px'}}/>
        {(resolution==='1mo'?["1y","2y","5y"]:resolution==='1wk'?["3mo","6mo","1y"]:["1mo","3mo","6mo"]).map(function(p){return <button key={p} className={'res-btn '+(period===p?'active':'')} onClick={function(){setPeriod(p)}}>{p}</button>})}
      </div>
    </div>

    {/* Heatmap Grid */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px',marginBottom:'16px'}}>
      {sorted.map(function(s,i){
        var isUp=(s.day_change_pct||0)>=0;
        var absPct=Math.abs(s.day_change_pct||0);
        var intensity=Math.min(absPct/3,1);
        var bg=isUp?'rgba(5,150,105,'+(0.06+intensity*0.14)+')':'rgba(220,38,38,'+(0.06+intensity*0.14)+')';
        var borderCol=isUp?'rgba(5,150,105,'+(0.15+intensity*0.25)+')':'rgba(220,38,38,'+(0.15+intensity*0.25)+')';
        return <div key={s.symbol} onClick={function(){setSelSector(selSector===s.symbol?null:s.symbol)}}
          style={{background:bg,border:'2px solid '+borderCol,borderRadius:'10px',padding:'12px',cursor:'pointer',transition:'all .15s',
            transform:selSector===s.symbol?'scale(1.02)':'scale(1)',boxShadow:selSector===s.symbol?'0 4px 16px rgba(0,0,0,.1)':'none'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}}>
            <div>
              <div style={{fontSize:'10px',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.3px'}}>{s.sector||''}</div>
              <div style={{fontSize:'13px',fontWeight:800,color:'var(--t1)',marginTop:'1px'}}>{s.name}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'16px',fontWeight:800,fontFamily:"'JetBrains Mono'",color:isUp?'var(--gn)':'var(--rd)'}}>{(isUp?'+':'')+s.day_change_pct.toFixed(2)+'%'}</div>
              <div style={{fontSize:'10px',fontFamily:"'JetBrains Mono'",color:'var(--t3)'}}>{s.latest?'₹'+s.latest.toLocaleString():''}</div>
            </div>
          </div>
          <SectorMiniChart closes={s.closes} isUp={isUp} width={180} height={40}/>
          {s.period_change_pct!=null&&<div style={{fontSize:'9px',fontFamily:"'JetBrains Mono'",color:s.period_change_pct>=0?'var(--gn)':'var(--rd)',marginTop:'4px',textAlign:'right'}}>
            {period+': '+(s.period_change_pct>=0?'+':'')+s.period_change_pct.toFixed(2)+'%'}
          </div>}
        </div>
      })}
    </div>

    {/* Expanded sector chart */}
    {selSector && (function(){
      var s=sorted.find(function(x){return x.symbol===selSector});
      if(!s||!s.closes)return null;
      return <IndexChart market="nifty500" overrideSymbol={selSector}/>;
    })()}

    {/* Performance table */}
    <div className="tc2"><div className="ts"><table>
      <thead><tr>
        <th>Sector</th><th>Index</th><th>Price</th><th>Day Change</th><th>Period Change</th><th>High</th><th>Low</th>
      </tr></thead>
      <tbody>{sorted.map(function(s){
        var isUp=(s.day_change_pct||0)>=0;
        var pUp=(s.period_change_pct||0)>=0;
        return <tr key={s.symbol} onClick={function(){setSelSector(selSector===s.symbol?null:s.symbol)}} style={{cursor:'pointer',background:selSector===s.symbol?'var(--cdh)':'transparent'}}>
          <td><span style={{fontFamily:"'DM Sans'",fontWeight:700,fontSize:'13px'}}>{s.sector||''}</span></td>
          <td><span style={{fontSize:'12px',color:'var(--t2)'}}>{s.name}</span></td>
          <td style={{fontWeight:700}}>{'₹'+(s.latest||0).toLocaleString()}</td>
          <td><span style={{padding:'3px 8px',borderRadius:'4px',fontSize:'11px',fontWeight:700,
            background:isUp?'var(--gg)':'var(--rg)',color:isUp?'var(--gn)':'var(--rd)'}}>
            {(isUp?'+':'')+s.day_change_pct.toFixed(2)+'%'}</span></td>
          <td><span style={{fontSize:'12px',fontWeight:700,fontFamily:"'JetBrains Mono'",color:pUp?'var(--gn)':'var(--rd)'}}>
            {(pUp?'+':'')+s.period_change_pct.toFixed(2)+'%'}</span></td>
          <td style={{fontSize:'12px',color:'var(--t2)'}}>{'₹'+(s.high||0).toLocaleString()}</td>
          <td style={{fontSize:'12px',color:'var(--t2)'}}>{'₹'+(s.low||0).toLocaleString()}</td>
        </tr>})}</tbody>
    </table></div></div>
  </div>;
}

/* ═══ Main App ═══ */
function App(){
  var [authed,setAuthed]=useState(function(){return sessionStorage.getItem('ss_auth')==='1'});
  var [authPwd,setAuthPwd]=useState('');
  var [authErr,setAuthErr]=useState('');
  var [authBusy,setAuthBusy]=useState(false);
  var [market,setMarket]=useState('nifty500');
  var [data,setData]=useState(null);
  var [status,setStatus]=useState(null);
  var [loading,setLoading]=useState(true);
  var [progress,setProgress]=useState(null);
  var [tab,setTab]=useState('all');
  var [search,setSearch]=useState('');
  var [sortK,setSortK]=useState('buy_score');
  var [sortA,setSortA]=useState(false);
  var [sel,setSel]=useState(null);
  var [watchlists,setWatchlists]=useState(loadWL);
  var [activeWL,setActiveWL]=useState(null);
  var [addingWL,setAddingWL]=useState(false);
  var [newWLName,setNewWLName]=useState('');
  var [scanError,setScanError]=useState(null);
  var [showDocs,setShowDocs]=useState(false);
  var [showChart,setShowChart]=useState(true);
  var [zerodhaHoldings,setZerodhaHoldings]=useState(null);
  var [zerodhaLoading,setZerodhaLoading]=useState(false);
  var [zerodhaError,setZerodhaError]=useState(null);
  var [zTokenInput,setZTokenInput]=useState('');
  var [zTokenBusy,setZTokenBusy]=useState(false);
  var [zShowLogin,setZShowLogin]=useState(false);
  var inputRef=useRef(null);
  var timerRef=useRef(null);

  var doAuth=function(){
    if(!authPwd.trim())return;
    setAuthBusy(true);setAuthErr('');
    fetch(API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:authPwd})})
      .then(function(r){return r.json()}).then(function(d){
        if(d.ok){sessionStorage.setItem('ss_auth','1');setAuthed(true)}
        else setAuthErr(d.error||'Incorrect password')
      }).catch(function(){setAuthErr('Network error')}).finally(function(){setAuthBusy(false)});
  };

  if(!authed)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',fontFamily:"'DM Sans',sans-serif"}}>
    <div style={{background:'var(--cd)',border:'1px solid var(--bd)',borderRadius:'14px',padding:'36px 32px',maxWidth:'340px',width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.08)',textAlign:'center'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginBottom:'20px'}}>
        <div className="lic">S</div><span style={{fontSize:'18px',fontWeight:800}}>SignalScope</span>
      </div>
      <div style={{fontSize:'13px',color:'var(--t3)',marginBottom:'20px'}}>Enter access password</div>
      <input type="password" value={authPwd} onChange={function(e){setAuthPwd(e.target.value)}} onKeyDown={function(e){if(e.key==='Enter')doAuth()}} placeholder="Password" autoFocus style={{width:'100%',padding:'10px 14px',borderRadius:'8px',border:'1px solid var(--bd)',fontSize:'14px',background:'var(--bg)',color:'var(--t1)',marginBottom:'12px',textAlign:'center',fontFamily:"'JetBrains Mono',monospace"}}/>
      <button onClick={doAuth} disabled={authBusy} style={{width:'100%',padding:'10px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#3b82f6,#6366f1)',color:'#fff',fontSize:'13px',fontWeight:700,cursor:'pointer',opacity:authBusy?.6:1}}>{authBusy?'Verifying...':'Unlock'}</button>
      {authErr&&<div style={{marginTop:'10px',fontSize:'12px',color:'var(--rd)'}}>{authErr}</div>}
    </div>
  </div>;

  var setAndSaveWL=function(w){setWatchlists(w);saveWL(w)};
  var createWL=function(name){if(!name.trim())return;var w=Object.assign({},watchlists);w[name.trim()]=[];setAndSaveWL(w);setAddingWL(false);setNewWLName('')};
  var deleteWL=function(name){var w=Object.assign({},watchlists);delete w[name];setAndSaveWL(w);if(activeWL===name)setActiveWL(null)};
  var toggleInWL=function(wlName,symbol,add){var w=Object.assign({},watchlists);if(!w[wlName])w[wlName]=[];if(add&&!w[wlName].includes(symbol))w[wlName].push(symbol);if(!add)w[wlName]=w[wlName].filter(function(s){return s!==symbol});setAndSaveWL(w)};

  var fetchAll=useCallback(function(){
    return Promise.all([
      fetch(API+'/api/results?market='+market),
      fetch(API+'/api/status'),
      fetch(API+'/api/progress')
    ]).then(function(res){return Promise.all(res.map(function(r){return r.json()}))})
      .then(function(arr){setData(arr[0]);setStatus(arr[1]);setProgress(arr[2])})
      .catch(function(){}).finally(function(){setLoading(false)});
  },[market]);

  useEffect(function(){
    setLoading(true);setData(null);
    fetchAll();
    if(timerRef.current)clearInterval(timerRef.current);
    timerRef.current=setInterval(fetchAll,5000);
    return function(){if(timerRef.current)clearInterval(timerRef.current)};
  },[fetchAll]);

  var triggerScan=function(){
    setScanError(null);
    fetch(API+'/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({markets:[market]})})
      .then(function(r){return r.json()}).then(function(j){if(j.error)setScanError(j.error);fetchAll()})
      .catch(function(){setScanError('Network error')});
  };
  var triggerScanAll=function(){
    setScanError(null);
    fetch(API+'/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({markets:["nifty500","nasdaq100"]})})
      .then(function(r){return r.json()}).then(function(j){if(j.error)setScanError(j.error);fetchAll()})
      .catch(function(){setScanError('Network error')});
  };
  var stopScan=function(){fetch(API+'/api/stop',{method:'POST'}).then(function(){setTimeout(fetchAll,1000)})};

  // ── Zerodha ──
  var zConf=status&&status.zerodha_configured;
  var zConn=status&&status.zerodha_connected;
  var zUser=status&&status.zerodha_user;
  var zLoginUrl=status&&status.login_url;
  var openZerodhaLogin=function(){setZShowLogin(true);setZerodhaError(null)};
  var submitRequestToken=function(){
    var token=zTokenInput.trim();if(!token)return;
    var match=token.match(/request_token=([^&]+)/);if(match)token=match[1];
    setZTokenBusy(true);setZerodhaError(null);
    fetch(API+'/api/zerodha/exchange_token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_token:token})})
      .then(function(r){return r.json()}).then(function(d){if(d.error)setZerodhaError(d.error);else{setZShowLogin(false);setZTokenInput('');fetchAll()}})
      .catch(function(){setZerodhaError('Network error')}).finally(function(){setZTokenBusy(false)});
  };
  var disconnectZerodha=function(){fetch(API+'/api/zerodha/logout',{method:'POST'}).then(function(){setZerodhaHoldings(null);setZShowLogin(false);fetchAll()})};
  var fetchZerodhaHoldings=function(){
    setZerodhaLoading(true);setZerodhaError(null);
    fetch(API+'/api/zerodha/holdings').then(function(r){return r.json()}).then(function(d){
      if(d.error){setZerodhaError(d.error);if(d.expired)disconnectZerodha();}else setZerodhaHoldings(d);
    }).catch(function(){setZerodhaError('Network error')}).finally(function(){setZerodhaLoading(false)});
  };
  useEffect(function(){if(zConn&&tab==='zport'&&!zerodhaHoldings&&!zerodhaLoading)fetchZerodhaHoldings()},[zConn,tab]);

  var doSort=function(k){if(sortK===k)setSortA(!sortA);else{setSortK(k);setSortA(false)}};

  var goldenMatch=function(s){
    var lowPct=typeof s.macd_low_pct==='number'?s.macd_low_pct:0;
    var slope=typeof s.macd_slope==='number'?s.macd_slope:999;
    var smaS=typeof s.sma200_slope==='number'?s.sma200_slope:0;
    return lowPct>=60 && slope>=-0.5 && slope<=0.2 && smaS>0.1;
  };

  var allStocks=(data&&data.all_stocks)||[];
  var isSc=!!(status&&status.is_scanning);
  var mktConf=MARKETS[market];
  var cur=mktConf?mktConf.currency:'₹';
  var prog=progress&&progress[market]?progress[market]:{};

  var stocks=useMemo(function(){
    if(!data)return[];
    var l=tab==='buy'?(data.buy_signals||[])
      :tab==='sell'?(data.sell_signals||[])
      :tab==='port'?allStocks.filter(function(s){return s.in_portfolio})
      :tab==='setups'?allStocks.filter(function(s){
        if(goldenMatch(s))return true;
        var smaOk=s.buy_breakdown&&s.buy_breakdown.sma200&&s.buy_breakdown.sma200.pass;
        var macdOk=s.macd_phase==='BUY FLIP'||s.macd_phase==='EARLY BUY';
        return smaOk&&macdOk;
      })
      :allStocks;
    if(activeWL){
      var syms=watchlists[activeWL]||[];
      l=allStocks.filter(function(s){return syms.includes(s.symbol)});
    }
    if(search){var q=search.toLowerCase();l=l.filter(function(s){return s.symbol.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)})}
    return l.slice().sort(function(a,b){var va=a[sortK],vb=b[sortK];if(va==null)return 1;if(vb==null)return-1;return sortA?(va>vb?1:-1):(va<vb?1:-1)});
  },[data,activeWL,watchlists,tab,search,sortK,sortA]);

  var nB=(data&&data.buy_signals||[]).length;
  var nS=(data&&data.sell_signals||[]).length;
  var nT=allStocks.length;
  var nP=allStocks.filter(function(s){return s.in_portfolio}).length;
  var nSetups=allStocks.filter(function(s){return goldenMatch(s)||(s.buy_breakdown&&s.buy_breakdown.sma200&&s.buy_breakdown.sma200.pass&&(s.macd_phase==='BUY FLIP'||s.macd_phase==='EARLY BUY'))}).length;

  if(loading&&!data)return <div className="ld"><div className="sp"/>Connecting...</div>;

  return <div>
    <header className="hdr"><div className="hi">
      <div className="logo"><div className="lic">S</div><div className="lt">SignalScope</div></div>
      <div className="hr">
        {isSc?<button className="btn btn-r" onClick={stopScan}>⏹ Stop</button>
        :<React.Fragment>
          <button className="btn btn-g" onClick={triggerScan}>▶ Scan {mktConf.name}</button>
          <button className="btn" onClick={triggerScanAll} style={{background:'rgba(99,102,241,.08)',color:'#6366f1',border:'1px solid rgba(99,102,241,.2)'}}>▶ Scan All</button>
        </React.Fragment>}
        {zConf && (zConn
          ?<div className="bdg" style={{background:'rgba(5,150,105,.08)',border:'1px solid rgba(5,150,105,.2)',cursor:'pointer'}} onClick={disconnectZerodha}><div className="dot on"/>{'Zerodha: '+(zUser||'✓')}</div>
          :<button className="btn" onClick={openZerodhaLogin} style={{background:'rgba(232,68,68,.1)',color:'#e84444',border:'1px solid rgba(232,68,68,.25)',fontWeight:700}}>🔗 Zerodha</button>
        )}
        <button className="btn" onClick={function(){window.open('__GOOGLE_DRIVE_PDF_LINK__','_blank')}} style={{background:'rgba(99,102,241,.08)',color:'#6366f1',border:'1px solid rgba(99,102,241,.2)'}}>📖</button>
      </div>
    </div></header>

    {/* ── Market Switcher Bar ── */}
    <div className="mkt-bar">
      {Object.values(MARKETS).map(function(m){
        var mktStatus=status&&status.markets&&status.markets[m.id];
        var lastScan=mktStatus&&mktStatus.last_scan;
        return <button key={m.id} className={'mkt-btn '+(market===m.id?'active':'')}
          onClick={function(){setMarket(m.id);setTab('all');setSearch('');setActiveWL(null)}}>
          <span className="mkt-flag">{m.flag}</span>
          <span className="mkt-label">
            <span className="mkt-name">{m.name}</span>
            <span className="mkt-sub">{m.sub}{lastScan?' · '+ago(lastScan):''}</span>
          </span>
        </button>
      })}
    </div>

    <main className="mn">
      {scanError && <div style={{padding:'8px 14px',background:'var(--rg)',borderRadius:'8px',fontSize:'11px',color:'var(--rd)',fontWeight:600,marginBottom:'10px'}}>{scanError}</div>}

      {/* Zerodha token paste banner */}
      {zShowLogin && !zConn && <div style={{padding:'14px 18px',background:'linear-gradient(135deg,rgba(232,68,68,.06),rgba(232,68,68,.02))',border:'1px solid rgba(232,68,68,.15)',borderRadius:'10px',marginBottom:'12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
          <span style={{fontSize:'13px',fontWeight:700,color:'#e84444'}}>🔗 Connect Zerodha</span>
          <button onClick={function(){setZShowLogin(false)}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',fontSize:'16px'}}>✕</button>
        </div>
        <div style={{display:'flex',gap:'16px',marginBottom:'12px'}}>
          <div style={{flex:1,padding:'12px',background:'var(--cd)',borderRadius:'8px',border:'1px solid var(--bd)'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'var(--t3)',marginBottom:'6px',letterSpacing:'.5px'}}>STEP 1 — Login to Zerodha</div>
            <div style={{fontSize:'11px',color:'var(--t2)',marginBottom:'8px'}}>Click the link below to login. After login you will land on a page with a URL containing your request token.</div>
            {zLoginUrl?<a href={zLoginUrl} target="_blank" rel="noopener noreferrer" style={{display:'inline-block',padding:'6px 14px',background:'#e84444',color:'#fff',borderRadius:'6px',fontSize:'11px',fontWeight:700,textDecoration:'none'}}>Open Zerodha Login ↗</a>
            :<span style={{fontSize:'11px',color:'var(--rd)'}}>ZERODHA_API_KEY not configured</span>}
          </div>
          <div style={{flex:1,padding:'12px',background:'var(--cd)',borderRadius:'8px',border:'1px solid var(--bd)'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'var(--t3)',marginBottom:'6px',letterSpacing:'.5px'}}>STEP 2 — Paste the token</div>
            <div style={{fontSize:'11px',color:'var(--t2)',marginBottom:'8px'}}>Copy the full redirect URL or just the <code style={{fontSize:'10px',background:'var(--bg2)',padding:'1px 4px',borderRadius:'3px'}}>request_token</code> value.</div>
          </div>
        </div>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <input value={zTokenInput} onChange={function(e){setZTokenInput(e.target.value)}} onKeyDown={function(e){if(e.key==='Enter')submitRequestToken()}}
            placeholder="Paste full URL or request_token here..." style={{flex:1,padding:'9px 12px',borderRadius:'6px',border:'1px solid var(--bd)',fontSize:'12px',fontFamily:"'JetBrains Mono',monospace",background:'var(--cd)',color:'var(--t1)'}}/>
          <button className="btn btn-g" onClick={submitRequestToken} disabled={zTokenBusy||!zTokenInput.trim()}>{zTokenBusy?'Connecting...':'Connect'}</button>
        </div>
        {zerodhaError && <div style={{marginTop:'8px',fontSize:'11px',color:'var(--rd)',fontWeight:600}}>{zerodhaError}</div>}
      </div>}

      {/* Index Chart (collapsible) */}
      <div style={{marginBottom:'4px',display:'flex',justifyContent:'flex-end'}}>
        <button onClick={function(){setShowChart(!showChart)}} style={{background:'none',border:'none',fontSize:'11px',color:'var(--t3)',cursor:'pointer',fontWeight:600}}>
          {showChart?'▼ Hide Index Chart':'▶ Show Index Chart'}
        </button>
      </div>
      {showChart && <IndexChart market={market}/>}

      {/* Scan progress */}
      {isSc && prog.total>0 && (function(){
        var pct=prog.total>0?Math.round(prog.current/prog.total*100):0;
        return <div className="scan-bar" style={{flexDirection:'column',gap:'6px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',width:'100%'}}>
            <div className="sp" style={{width:16,height:16,margin:0,borderWidth:2,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}>
                <span className="scan-txt">{mktConf.name+': '+(prog.current||0)+'/'+(prog.total||'?')}</span>
                <span className="scan-txt">{pct+'%'+(prog.ok>0?' · '+prog.ok+' analyzed':'')}</span>
              </div>
              <div className="scan-prog"><div className="scan-fill" style={{width:pct+'%'}}/></div>
            </div>
          </div>
        </div>;
      })()}

      <div className="sts">
        <div className="st"><div className="stl">{mktConf.name}</div><div className="stv" style={{color:'var(--bl)'}}>{nT}</div><div className="sts2">{(prog.skipped||0)+' skipped'}</div></div>
        <div className="st"><div className="stl">Buy Signals</div><div className="stv" style={{color:'var(--gn)'}}>{nB}</div><div className="sts2">{'≥60 pts'}</div></div>
        <div className="st"><div className="stl">Sell</div><div className="stv" style={{color:'var(--rd)'}}>{nS}</div><div className="sts2">{'≥45 pts'}</div></div>
        <div className="st"><div className="stl">Portfolio</div><div className="stv" style={{color:'var(--pu)'}}>{nP}</div></div>
      </div>

      <div className="wl-bar">
        <span style={{fontSize:'10px',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Watchlists:</span>
        {Object.keys(watchlists).map(function(wn){return <div key={wn} className={'wl-chip '+(activeWL===wn?'a':'')} onClick={function(){setActiveWL(activeWL===wn?null:wn);setTab('all')}}>
          {wn}<span className="idx-cnt">{(watchlists[wn]||[]).length}</span>
          <span className="x" onClick={function(e){e.stopPropagation();if(confirm('Delete "'+wn+'"?'))deleteWL(wn)}}>✕</span>
        </div>})}
        {addingWL?<form onSubmit={function(e){e.preventDefault();createWL(newWLName)}} style={{display:'flex',gap:'4px'}}><input ref={inputRef} className="wl-input" value={newWLName} onChange={function(e){setNewWLName(e.target.value)}} placeholder="Name..."/><button type="submit" className="btn btn-sm btn-pu">Add</button></form>
        :<button className="wl-add-btn" onClick={function(){setAddingWL(true)}}>+ New</button>}
      </div>

      <div className="tabs">
        <button className={'tab '+(tab==='all'?'a':'')} onClick={function(){setTab('all')}}>All<span className="tc tcb">{nT}</span></button>
        <button className={'tab '+(tab==='setups'?'a':'')} onClick={function(){setTab('setups')}}>{'🎯 Setups'}<span className="tc tcg">{nSetups}</span></button>
        <button className={'tab '+(tab==='buy'?'a':'')} onClick={function(){setTab('buy')}}>Buy<span className="tc tcg">{nB}</span></button>
        <button className={'tab '+(tab==='sell'?'a':'')} onClick={function(){setTab('sell')}}>Sell<span className="tc tcr">{nS}</span></button>
        {market==='nifty500'&&<button className={'tab '+(tab==='port'?'a':'')} onClick={function(){setTab('port')}}>Portfolio<span className="tc tcb">{nP}</span></button>}
        {zConn && market==='nifty500' && <button className={'tab '+(tab==='zport'?'a':'')} onClick={function(){setTab('zport')}} style={tab==='zport'?{background:'rgba(232,68,68,.12)'}:{}}>{'💰 Zerodha'}<span className="tc" style={{background:'rgba(232,68,68,.08)',color:'#e84444'}}>{zerodhaHoldings?zerodhaHoldings.holdings.length:'?'}</span></button>}
        {market==='nifty500' && <button className={'tab '+(tab==='sectors'?'a':'')} onClick={function(){setTab('sectors')}} style={tab==='sectors'?{background:'rgba(99,102,241,.12)'}:{}}>{'📊 Sectors'}</button>}
      </div>

      <div className="srch"><input placeholder={"Search "+mktConf.name+"..."} value={search} onChange={function(e){setSearch(e.target.value)}}/></div>

      {/* Zerodha Portfolio Tab */}
      {tab==='zport'?<div>
        {zerodhaLoading?<div className="ld"><div className="sp"/>Loading Zerodha holdings...</div>
        :zerodhaError?<div style={{padding:'12px',background:'var(--rg)',borderRadius:'8px',fontSize:'12px',color:'var(--rd)',marginBottom:'12px'}}>{zerodhaError}<button className="btn btn-sm" onClick={openZerodhaLogin} style={{marginLeft:'8px'}}>Reconnect</button></div>
        :!zerodhaHoldings?<div className="empty"><div style={{fontSize:'32px',marginBottom:'8px'}}>💰</div><div style={{fontSize:'13px'}}>Click below to load holdings.</div><button className="btn btn-g" onClick={fetchZerodhaHoldings} style={{marginTop:'12px'}}>Load Holdings</button></div>
        :(function(){
          var hld=zerodhaHoldings.holdings;var sum=zerodhaHoldings.summary;
          return <div>
            <div className="sts" style={{gridTemplateColumns:'repeat(6,1fr)',marginBottom:'14px'}}>
              <div className="st"><div className="stl">Holdings</div><div className="stv" style={{color:'var(--bl)'}}>{sum.total_stocks}</div></div>
              <div className="st"><div className="stl">Invested</div><div className="stv" style={{fontSize:'16px'}}>{'₹'+fmtVol(sum.total_invested)}</div></div>
              <div className="st"><div className="stl">Current</div><div className="stv" style={{fontSize:'16px'}}>{'₹'+fmtVol(sum.total_current)}</div></div>
              <div className="st"><div className="stl">Total P&L</div><div className="stv" style={{fontSize:'16px',color:sum.total_pnl>=0?'var(--gn)':'var(--rd)'}}>{(sum.total_pnl>=0?'+':'')+'₹'+fmtVol(Math.abs(sum.total_pnl))}</div><div className="sts2">{sum.total_return_pct.toFixed(1)+'%'}</div></div>
              <div className="st"><div className="stl">Day P&L</div><div className="stv" style={{fontSize:'16px',color:sum.day_pnl>=0?'var(--gn)':'var(--rd)'}}>{(sum.day_pnl>=0?'+':'')+'₹'+fmtVol(Math.abs(sum.day_pnl))}</div></div>
              <div className="st"><div className="stl">Sell Alerts</div><div className="stv" style={{color:sum.sell_alerts>0?'var(--rd)':'var(--gn)'}}>{sum.sell_alerts}</div></div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'8px'}}><button className="btn btn-sm btn-pu" onClick={fetchZerodhaHoldings}>↻ Refresh</button></div>
            <div className="tc2"><div className="ts"><table>
              <thead><tr><th>Stock</th><th>Qty</th><th>Invested</th><th>LTP</th><th>P&L</th><th>Return</th><th>Buy</th><th>Sell Score</th><th>MACD</th><th>Verdict</th></tr></thead>
              <tbody>{hld.map(function(h){
                var sc=h.scan;var retPct=h.total_return_pct;
                var verdict=null;
                if(sc){
                  if(sc.sell_score>=65)verdict=<span className="sig sig-s">SELL NOW</span>;
                  else if(sc.sell_score>=45)verdict=<span className="sig" style={{background:'rgba(239,68,68,.08)',color:'#f87171',border:'1px solid rgba(239,68,68,.2)'}}>MOD SELL</span>;
                  else if(sc.sell_score>=30&&retPct>=25)verdict=<span className="sig" style={{background:'rgba(249,115,22,.08)',color:'#f97316',border:'1px solid rgba(249,115,22,.2)'}}>BOOK PROFIT?</span>;
                  else verdict=<span className="sig sig-h">HOLD</span>;
                }else verdict=<span className="sig sig-h">N/A</span>;
                return <tr key={h.tradingsymbol} onClick={function(){if(sc)setSel(sc)}} style={{cursor:sc?'pointer':'default'}}>
                  <td><div className="sn"><span className="sns">{h.tradingsymbol}</span>{!sc&&<span style={{display:'inline-block',padding:'1px 5px',borderRadius:'3px',fontSize:'8px',fontWeight:600,background:'rgba(148,163,184,.1)',color:'var(--t3)',marginLeft:'4px'}}>no scan</span>}<br/><span className="snn">{h.exchange}{h.day_change_pct!==0&&<span style={{color:h.day_change_pct>=0?'var(--gn)':'var(--rd)',marginLeft:'4px'}}>{(h.day_change_pct>=0?'+':'')+h.day_change_pct.toFixed(1)+'%'}</span>}</span></div></td>
                  <td style={{fontWeight:600}}>{h.quantity}</td>
                  <td><div style={{display:'flex',flexDirection:'column'}}><span style={{fontSize:'10px',color:'var(--t2)',fontWeight:600}}>{'₹'+fmtVol(h.invested)}</span><span style={{fontSize:'8px',color:'var(--t3)'}}>{'@₹'+fmt(h.avg_price)}</span></div></td>
                  <td style={{fontWeight:600}}>{'₹'+fmt(h.ltp)}</td>
                  <td style={{color:h.pnl>=0?'var(--gn)':'var(--rd)',fontWeight:700,fontSize:'11px'}}>{(h.pnl>=0?'+':'')+'₹'+fmtVol(Math.abs(h.pnl))}</td>
                  <td><span style={{padding:'3px 8px',borderRadius:'4px',fontSize:'10px',fontWeight:700,background:retPct>=0?'var(--gg)':'var(--rg)',color:retPct>=0?'var(--gn)':'var(--rd)'}}>{(retPct>=0?'+':'')+retPct.toFixed(1)+'%'}</span></td>
                  <td><span style={{fontSize:'10px',color:'var(--t3)',fontFamily:"'JetBrains Mono'"}}>{sc?sc.buy_score:'—'}</span></td>
                  <td>{sc?<span className={'score score-sell '+(sc.sell_score>=65?'strong':'')} style={{fontSize:'12px'}}>{sc.sell_score||0}</span>:<span style={{color:'var(--t3)',fontSize:'10px'}}>—</span>}</td>
                  <td>{sc?<MACDSlope slope={sc.macd_slope} phase={sc.macd_phase} curve={sc.macd_curve} zeroY={sc.macd_zero_y} macdVal={sc.macd}/>:<span style={{color:'var(--t3)',fontSize:'10px'}}>—</span>}</td>
                  <td>{verdict}</td>
                </tr>})}</tbody>
            </table></div></div>
          </div>
        })()}
      </div>

      :tab==='sectors'?<SectorDashboard/>

      :/* Main Stock Table */
      <div className="tc2">
        {stocks.length===0?<div className="empty"><div style={{fontSize:'32px',marginBottom:'8px'}}>📊</div><div style={{fontSize:'13px'}}>{search?'No match for "'+search+'"':isSc?'Scanning...':'No data yet. Click Scan to start.'}</div></div>
        :<div className="ts"><table>
          <thead><tr>
            <th onClick={function(){doSort('symbol')}}>Stock</th>
            <th onClick={function(){doSort('price')}}>Price</th>
            <th onClick={function(){doSort('buy_score')}}>Buy</th>
            <th onClick={function(){doSort('sell_score')}}>Sell</th>
            <th onClick={function(){doSort('macd_slope')}}>MACD</th>
            <th onClick={function(){doSort('price_accel')}}>Price</th>
            <th onClick={function(){doSort('rr_ratio')}}>R:R</th>
            <th onClick={function(){doSort('risk_in_atrs')}}>ATR Risk</th>
            <th onClick={function(){doSort('capital_needed')}}>Capital</th>
            <th onClick={function(){doSort('roc_pct')}}>ROC%</th>
            <th>Signal</th>
          </tr></thead>
          <tbody>{stocks.map(function(s){return <tr key={s.symbol} onClick={function(){setSel(s)}} style={{cursor:'pointer'}}>
            <td><div className="sn"><span className="sns">{s.name}</span>{goldenMatch(s) && <span style={{display:'inline-block',padding:'1px 5px',borderRadius:'3px',fontSize:'9px',fontWeight:700,background:'rgba(217,119,6,.12)',color:'#b45309',marginLeft:'4px'}}>★ GOLDEN</span>}{s.in_portfolio && <span className="pb">HELD</span>}<br/><span className="snn">{s.symbol}{s.avg_vol_20?' · Vol '+fmtVol(s.avg_vol_20):''}<ITags indices={s.indices}/></span></div></td>
            <td style={{fontWeight:600,fontSize:'14px'}}>{cur}{fmt(s.price)}</td>
            <td><span className={'score score-buy '+(s.buy_score>=75?'strong':'')}>{s.buy_score}</span></td>
            <td><span className={'score score-sell '+(s.sell_score>=65?'strong':'')}>{s.sell_score||0}</span></td>
            <td><MACDSlope slope={s.macd_slope} phase={s.macd_phase} curve={s.macd_curve} zeroY={s.macd_zero_y} macdVal={s.macd}/></td>
            <td><PriceAccel vel={s.price_vel} accel={s.price_accel} upDays={s.up_days}/></td>
            <td><RR ratio={s.rr_ratio}/></td>
            <td>{s.risk_in_atrs!=null?<span style={{fontSize:'13px',fontWeight:700,color:s.risk_in_atrs>=1.5?'var(--gn)':s.risk_in_atrs>=1?'var(--am)':'var(--rd)'}}>{s.risk_in_atrs.toFixed(1)}<span style={{fontSize:'9px',color:'var(--t3)'}}> ATR</span></span>:<span style={{color:'var(--t3)',fontSize:'12px'}}>—</span>}</td>
            <td><div style={{display:'flex',flexDirection:'column'}}><span style={{fontSize:'13px',fontWeight:700,color:'var(--t2)'}}>{s.capital_needed?cur+fmtVol(s.capital_needed):'—'}</span>{s.potential_profit>0&&<span style={{fontSize:'10px',color:'var(--gn)'}}>{'→'+cur+fmtVol(s.potential_profit)}</span>}</div></td>
            <td>{s.roc_pct!=null&&s.roc_pct>0?<span style={{fontSize:'13px',fontWeight:700,color:s.roc_pct>=10?'var(--gn)':s.roc_pct>=5?'var(--am)':'var(--t2)'}}>{s.roc_pct.toFixed(1)}%</span>:<span style={{color:'var(--t3)',fontSize:'12px'}}>—</span>}</td>
            <td>{goldenMatch(s)?<span className="sig" style={{background:'rgba(217,119,6,.12)',color:'#b45309',border:'1px solid rgba(217,119,6,.3)',fontWeight:800}}>★ GOLDEN</span>:s.buy_score>=75?<span className="sig sig-b">STRONG BUY</span>:s.buy_score>=60?<span className="sig sig-mb">MOD BUY</span>:s.sell_score>=65?<span className="sig sig-s">STRONG SELL</span>:s.sell_score>=45?<span className="sig" style={{background:'rgba(239,68,68,.08)',color:'#f87171',border:'1px solid rgba(239,68,68,.2)'}}>MOD SELL</span>:<span className="sig sig-h">HOLD</span>}</td>
          </tr>})}</tbody>
        </table></div>}
      </div>}
    </main>
    {sel && <Modal s={sel} onClose={function(){setSel(null)}} watchlists={watchlists} onAddToWL={toggleInWL} isGolden={goldenMatch(sel)}/>}
  </div>;
}

class EB extends React.Component{
  constructor(p){super(p);this.state={e:null}}
  static getDerivedStateFromError(e){return{e:e}}
  render(){if(this.state.e)return React.createElement('div',{style:{padding:'40px',color:'#dc2626',fontFamily:'monospace',fontSize:'13px'}},React.createElement('h2',null,'UI Error'),React.createElement('pre',{style:{whiteSpace:'pre-wrap'}},String(this.state.e)),React.createElement('button',{onClick:function(){window.location.reload()},style:{marginTop:'16px',padding:'8px 16px',background:'#10b981',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}},'Reload'));return this.props.children}
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(EB,null,React.createElement(App)));
</script>
</body>
</html>
